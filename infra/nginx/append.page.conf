# /etc/nginx/conf.d/append.page.conf
#
# nginx server block for append.page. Drop this into /etc/nginx/conf.d/.
# Coexists with the existing inline server blocks for aggregativeqa.com and
# interactivetraining.ai. We never edit those.
#
# Two upstreams:
#   * BACKEND (127.0.0.1:38080) — the API: /pages POST, /p/<slug>/{entries,raw,
#     bodies,e/<id>}, /AGENTS.md, /privacy, /terms, /contact, /status,
#     /api/*, /anchor/*. Plus the markdown documents.
#   * FRONTEND (127.0.0.1:38081) — the Next.js UI: /, /new, /p/<slug>,
#     /p/<slug>/audit. Talks to the backend via same-origin fetch.
#
# Routing strategy: explicit whitelist of backend paths; everything else
# falls through to the frontend.
#
# TLS: certbot --webroot, cert at /etc/letsencrypt/live/append.page/. Covers
# both append.page and www.append.page; auto-renew via certbot.timer.

# --- per-IP rate limit zone for write endpoints ---
limit_req_zone $binary_remote_addr zone=appendpage_write:10m rate=60r/m;

# --- HTTP (apex + www): ACME challenge + redirect to HTTPS apex ---
server {
    listen 80;
    listen [::]:80;
    server_name append.page www.append.page;

    # ACME HTTP-01 challenge (certbot --webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/append.page-acme;
        default_type "text/plain";
    }

    # Redirect both apex and www to the apex over HTTPS.
    location / {
        return 301 https://append.page$request_uri;
    }
}

# --- HTTPS: redirect www -> apex ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.append.page;

    ssl_certificate     /etc/letsencrypt/live/append.page/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/append.page/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 301 https://append.page$request_uri;
}

# --- HTTPS: the actual site ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name append.page;

    ssl_certificate     /etc/letsencrypt/live/append.page/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/append.page/privkey.pem;
    ssl_session_cache shared:SSL_appendpage:1m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- security headers ---
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP relaxed for v0 (Next.js needs unsafe-inline for some bootstrap scripts).
    # Tighten in Phase D when the UI is stable.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'" always;

    # --- limits ---
    client_max_body_size 16k;
    client_body_timeout 10s;
    client_header_timeout 5s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # --- ACME challenge fallback ---
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/append.page-acme;
        default_type "text/plain";
    }

    # ----- BACKEND ROUTES -----
    # All paths that should hit the API server, not the UI.
    # The order of `location` blocks matters: regex matches beat prefix
    # matches once we use the ~ form, so put specific routes first.

    # Static-served raw JSONL (no app CPU per byte). Falls through to the
    # backend if the materialized file isn't present yet.
    location ~ "^/p/(?<slug>[a-z0-9][a-z0-9-]{1,48})/raw$" {
        try_files /var/lib/appendpage/pages/$slug.jsonl @backend;
        types { } default_type "application/x-ndjson; charset=utf-8";
        add_header Cache-Control "public, max-age=10, stale-while-revalidate=60";
    }

    # /pages: GET is the list/search endpoint (landing page + /new autocomplete
    # — must not be rate-limited, or typing in the slug box dies); POST is
    # page creation, rare per IP, guarded by slug rules + manual-review-queue
    # for name-shaped slugs, so no request-rate cap needed here in v0.
    # (nginx 1.18 doesn't allow `limit_req` inside `limit_except`; simplest
    # to just drop it from this route altogether.)
    location = /pages {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }
    location ~ "^/p/[^/]+/entries(/[^/]+/flag)?$" {
        limit_req zone=appendpage_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }
    location ~ "^/p/[^/]+/bodies$" {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }
    location ~ "^/p/[^/]+/(anchor\.txt|e/[^/]+|views/.+|tags)$" {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    # Backend read endpoints + markdown documents + spec.
    location ~ "^/(AGENTS\.md|agents\.md|Agents\.md|privacy|terms|contact|status)$" {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }
    location /anchor/ {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    # ----- FRONTEND ROUTES (catch-all) -----
    # Everything not matched above goes to the Next.js UI.
    location / {
        proxy_pass http://127.0.0.1:38081;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Named upstream for the try_files fallback above.
    location @backend {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    # --- per-server access logs ---
    access_log /var/log/nginx/append.page-access.log;
    error_log  /var/log/nginx/append.page-error.log info;
}
