# /etc/nginx/conf.d/append.page.conf
#
# nginx server block for append.page. Drop this into /etc/nginx/conf.d/ on the
# host (the bootstrap script does this). The host's nginx.conf must include
# /etc/nginx/conf.d/*.conf — bootstrap.sh uncomments that line if it's
# currently commented out, but does NOT touch any other tenant's config.
#
# Coexists with the existing inline server blocks for aggregativeqa.com and
# interactivetraining.ai. We never edit those.
#
# TLS: certbot --webroot is used to obtain certs for append.page and
# www.append.page. The webroot challenge dir is /var/www/append.page-acme.

# --- per-IP rate limit zone for write endpoints ---
limit_req_zone $binary_remote_addr zone=appendpage_write:10m rate=60r/m;

# --- HTTP: ACME challenge + redirect to HTTPS ---
# NOTE: www.append.page has no DNS A record yet; if you add one later,
# add it back to server_name in this block and the HTTPS block below,
# add a www-redirect HTTPS server, and re-issue the cert with -d www.append.page.
server {
    listen 80;
    listen [::]:80;
    server_name append.page;

    # ACME HTTP-01 challenge (certbot --webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/append.page-acme;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: the actual site ---
# Uses the legacy inline `http2` form (compatible with nginx 1.18+); newer
# nginx (1.25+) also accepts a separate `http2 on;` directive but keeping
# this form means the same config works on both.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name append.page;

    ssl_certificate     /etc/letsencrypt/live/append.page/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/append.page/privkey.pem;
    ssl_session_cache shared:SSL_appendpage:1m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- security headers (scoped to our server block; doesn't leak to the
    # other tenants on this nginx) ---
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP is relaxed for v0 (Next.js needs unsafe-inline for some bootstrap scripts).
    # Tighten in Phase D when the UI is stable.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'" always;

    # --- limits ---
    client_max_body_size 16k;
    client_body_timeout 10s;
    client_header_timeout 5s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # --- ACME challenge fallback (in case cert renewal needs HTTPS-served challenge) ---
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/append.page-acme;
        default_type "text/plain";
    }

    # --- static-served raw JSONL (no app CPU per byte) ---
    # Materializer writes /var/lib/appendpage/pages/<slug>.jsonl from PG.
    # If the file is missing, fall back to the app which streams from PG.
    # Regex is quoted because the `{1,48}` quantifier confuses the nginx
    # config parser (which uses `{}` for blocks) when unquoted.
    location ~ "^/p/(?<slug>[a-z0-9][a-z0-9-]{1,48})/raw$" {
        try_files /var/lib/appendpage/pages/$slug.jsonl @app;
        types { } default_type "application/x-ndjson; charset=utf-8";
        add_header Cache-Control "public, max-age=10, stale-while-revalidate=60";
    }

    # --- write endpoints get rate limited ---
    location /pages {
        limit_req zone=appendpage_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    location ~ ^/p/[^/]+/entries {
        limit_req zone=appendpage_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    # --- everything else proxies to the Next.js app ---
    location / {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- named upstream for try_files fallback ---
    location @app {
        proxy_pass http://127.0.0.1:38080;
        include /etc/nginx/proxy_params;
    }

    # --- log to our own files so we don't pollute the host's logs ---
    access_log /var/log/nginx/append.page-access.log;
    error_log  /var/log/nginx/append.page-error.log info;
}
