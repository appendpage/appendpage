# /etc/nginx/conf.d/append.page.conf  (HTTP-only bootstrap variant)
#
# Used during initial provisioning ONLY: served while we wait for certbot to
# issue the first TLS cert via the ACME HTTP-01 challenge. bootstrap.sh swaps
# this file for the full append.page.conf (with TLS) once the cert exists.
#
# Why a separate file: the full append.page.conf references
# /etc/letsencrypt/live/append.page/fullchain.pem, which doesn't exist on a
# brand-new install — nginx -t would fail and we'd refuse to reload.

server {
    listen 80;
    listen [::]:80;
    server_name append.page www.append.page;

    # ACME HTTP-01 challenge for certbot --webroot.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/append.page-acme;
        default_type "text/plain";
    }

    # Everything else returns a friendly placeholder while we provision.
    location / {
        return 503 "append.page is provisioning. Please come back in a few minutes.\n";
        default_type "text/plain";
        add_header Retry-After "600" always;
    }

    access_log /var/log/nginx/append.page-access.log;
    error_log  /var/log/nginx/append.page-error.log info;
}
